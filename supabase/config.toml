# VietGo Japan — Supabase local configuration
# https://supabase.com/docs/guides/cli/config

project_id = "vietgo-japan"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**", "http://127.0.0.1:5173/**"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Guest-callable functions: JWT verification disabled (protected by Turnstile server-side)
[functions.create-booking]
verify_jwt = false

[functions.submit-contact]
verify_jwt = false

[functions.submit-support]
verify_jwt = false

[functions.lookup-booking]
verify_jwt = false
